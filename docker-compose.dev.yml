services:
  postgres:
    image: postgres:16
    container_name: postgres16_cd_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis_cd_dev
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data_dev:/data
    command:
      - sh
      - -c
      - 'exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_cd_dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_cd_dev
    restart: unless-stopped
    ports:
      - "${REDISINSIGHT_PORT}:5540"
    volumes:
      - redisinsight_data_dev:/db
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDISINSIGHT_REDIS_URI=redis://:${REDIS_PASSWORD}@redis:6379
      - RI_BIND_ALL=1

volumes:
  pgdata_dev:
  redis_data_dev:
  redisinsight_data_dev:
